<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENTINEL-X | Advanced NBA Projection Engine</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Roboto+Mono:wght@500;700&display=swap');

        :root {
            --bg: #000000;
            --card-bg: #080808;
            --accent: #FF6B00;
            --text: #FFFFFF;
            --text-dim: #555555;
            --border: #1A1A1A;
            --box-bg: #111111;
            --positive: #00FF41;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 20px;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        header { 
            display: flex; 
            justify-content: space-between; 
            align-items: flex-end;
            border-bottom: 2px solid var(--accent);
            padding-bottom: 20px;
            margin-bottom: 30px;
        }
        .logo { font-size: 3.5rem; font-weight: 900; margin: 0; line-height: 0.8; }
        .logo span { color: var(--accent); }
        
        .sys-info {
            text-align: right;
            font-family: 'Roboto Mono', monospace;
            font-size: 0.8rem;
            color: var(--text-dim);
        }

        .controls {
            display: flex;
            justify-content: space-between;
            background: var(--card-bg);
            padding: 15px 25px;
            border-radius: 10px;
            border: 1px solid var(--border);
            margin-bottom: 30px;
            align-items: center;
        }

        .switch { position: relative; display: inline-block; width: 60px; height: 30px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { 
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; 
            background-color: #222; transition: .4s; border-radius: 34px; border: 1px solid var(--border);
        }
        input:checked + .slider { background-color: var(--accent); }
        .slider:before {
            position: absolute; content: ""; height: 22px; width: 22px; left: 4px; bottom: 3px;
            background-color: white; transition: .4s; border-radius: 50%;
        }
        input:checked + .slider:before { transform: translateX(30px); }

        .section-label {
            color: var(--accent);
            font-weight: 900;
            font-size: 1.2rem;
            margin: 40px 0 20px 0;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .section-label::after { content: ""; height: 1px; background: var(--border); flex-grow: 1; }

        .live-container { display: grid; gap: 25px; }
        .game-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 25px;
            position: relative;
            overflow: hidden;
        }
        .game-card::before {
            content: "DYNAMIC LIVE PROJECTION";
            position: absolute; top: 0; left: 0; background: var(--accent);
            color: black; font-size: 0.6rem; font-weight: 900; padding: 3px 12px;
        }

        .matchup-grid {
            display: grid;
            grid-template-columns: 1fr 200px 1fr;
            align-items: center;
            text-align: center;
            margin-bottom: 30px;
        }
        .team-box { display: flex; flex-direction: column; align-items: center; }
        .team-logo { width: 80px; height: 80px; object-fit: contain; margin-bottom: 10px; }
        .team-name { font-size: 1.8rem; font-weight: 900; }
        .score-big { font-family: 'Roboto Mono', monospace; font-size: 4rem; font-weight: 700; color: var(--accent); }

        .game-meta { display: flex; flex-direction: column; gap: 5px; }
        .clock-live { font-family: 'Roboto Mono', monospace; font-size: 1.5rem; color: var(--accent); }
        .period-live { font-weight: 800; color: var(--text-dim); border: 1px solid var(--border); padding: 4px; border-radius: 5px; }

        .proj-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }
        .proj-box {
            background: var(--box-bg);
            padding: 15px;
            border-radius: 12px;
            border-left: 3px solid var(--accent);
        }
        .proj-label { font-size: 0.65rem; color: var(--text-dim); margin-bottom: 8px; font-weight: 700; }
        .proj-value { font-family: 'Roboto Mono', monospace; font-size: 1.1rem; font-weight: 700; }
        .conf-tag { color: var(--accent); font-size: 0.7rem; margin-left: 5px; }

        .slate-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(400px, 1fr)); gap: 20px; }
        .upcoming-card {
            background: #050505;
            border: 1px solid #111;
            padding: 20px;
            border-radius: 15px;
        }
        .upcoming-header { display: flex; justify-content: space-between; margin-bottom: 15px; font-weight: 800; border-bottom: 1px solid #111; padding-bottom: 10px;}

        .empty-state {
            text-align: center; padding: 60px; color: var(--text-dim); font-weight: 800; font-size: 1.2rem;
        }
    </style>
</head>
<body>

    <header>
        <h1 class="logo">SENTINEL<span>X</span></h1>
        <div class="sys-info">
            <div id="clock-display">MAY 12, 2026 | 23:41:40</div>
            <div style="color: var(--accent)">ENGINE STATUS: <span id="engine-status">OFFLINE</span></div>
        </div>
    </header>

    <div class="controls">
        <div>
            <span style="font-weight: 900; font-size: 0.9rem;">NETWORK SYNC: </span>
            <span id="sync-timer" style="font-family: 'Roboto Mono'; color: var(--accent);">03</span>S
        </div>
        <div style="display: flex; align-items: center; gap: 15px;">
            <span style="font-size: 0.8rem; font-weight: 800;">ACTIVE POLLING</span>
            <label class="switch">
                <input type="checkbox" id="power-toggle" checked>
                <span class="slider"></span>
            </label>
        </div>
    </div>

    <div class="section-label">LIVE SENTINEL STREAM</div>
    <div id="live-root" class="live-container"></div>

    <div class="section-label">UPCOMING 72H SLATE</div>
    <div id="upcoming-root" class="slate-grid"></div>

<script>
    // --- API INTEGRATION ---
    const API_KEY = "a0c79a4e-901b-4739-abf1-6ed3ccdc309f"; 
    const POWER = document.getElementById('power-toggle');
    const LIVE_ROOT = document.getElementById('live-root');
    const UPCOMING_ROOT = document.getElementById('upcoming-root');
    const SYNC_TIMER_UI = document.getElementById('sync-timer');
    const CLOCK_UI = document.getElementById('clock-display');
    const STATUS_UI = document.getElementById('engine-status');

    let apiData = [];
    let syncCount = 3;

    // --- MATH UTILITIES ---
    function toAmerican(prob) {
        let p = prob / 100;
        if (p >= 0.999) return "-∞";
        if (p <= 0.001) return "+∞";
        if (p >= 0.5) {
            return `-${Math.round((p / (1 - p)) * 100)}`;
        } else {
            return `+${Math.round(((1 - p) / p) * 100)}`;
        }
    }

    function erf(x) {
        const a1 = 0.254829592, a2 = -0.284496736, a3 = 1.421413741;
        const a4 = -1.453152027, a5 = 1.061405429, p = 0.3275911;
        const sign = (x < 0) ? -1 : 1;
        x = Math.abs(x);
        const t = 1.0 / (1.0 + p * x);
        const y = 1.0 - (((((a5 * t + a4) * t) + a3) * t + a2) * t + a1) * t * Math.exp(-x * x);
        return sign * y;
    }

    // --- ADVANCED MATH ENGINE (NON-STATIC) ---
    function calculateSentinel(game) {
        // Progress derived from status string (e.g. "2nd Qtr 5:30")
        const progress = parseProgress(game.status);
        const homeScore = game.home_team_score;
        const awayScore = game.visitor_team_score;
        const currentMargin = homeScore - awayScore;
        const totalPoints = homeScore + awayScore;

        // Dynamic Pace Calculation: How many points per minute currently being scored?
        // NBA game is 48 mins.
        const currentPace = totalPoints / (progress || 0.01);
        const projectedTotal = currentPace * 1.0; // Linear projection of current pace

        // Dynamic Spread Calculation: Current margin adjusted for time remaining
        // Uses a decay function where current lead carries more weight as time decreases
        const timeRemaining = 1 - progress;
        const projectedSpread = currentMargin; 

        // Probability using normal distribution (Standard Deviation for NBA is ~12-14 points)
        // Adjusting volatility for time remaining
        const volatility = 13.5 * Math.sqrt(timeRemaining * 48); 
        const zScore = currentMargin / (volatility || 1);
        const winProb = 100 * (0.5 * (1 + erf(zScore / Math.sqrt(2)))); 
        
        return {
            spread: projectedSpread.toFixed(1),
            total: projectedTotal.toFixed(1),
            prob: Math.min(Math.max(winProb, 0.1), 99.9).toFixed(1),
            confidence: Math.round(progress * 100)
        };
    }

    function parseProgress(status) {
        if (status.includes("1st")) return 0.12;
        if (status.includes("2nd")) return 0.37;
        if (status.includes("Half")) return 0.50;
        if (status.includes("3rd")) return 0.62;
        if (status.includes("4th")) return 0.87;
        return 0.5; // Default middle
    }

    // --- DATA FETCHING ---
    async function syncData() {
        if (!POWER.checked) return;
        try {
            const today = new Date().toISOString().split('T')[0];
            const res = await fetch(`https://api.balldontlie.io/v1/games?dates[]=${today}`, {
                headers: { 'Authorization': API_KEY }
            });
            const data = await res.json();
            apiData = data.data || [];
            STATUS_UI.innerText = "CONNECTED";
            STATUS_UI.style.color = "var(--positive)";
            render();
        } catch (err) {
            STATUS_UI.innerText = "SYNC ERROR";
            STATUS_UI.style.color = "red";
        }
    }

    function render() {
        let liveHtml = '';
        let upcomingHtml = '';

        apiData.forEach(game => {
            const isLive = !game.status.includes("Final") && !game.status.includes("Scheduled") && game.status.includes(":");
            
            if (isLive) {
                const sentinel = calculateSentinel(game);

                liveHtml += `
                    <div class="game-card">
                        <div class="matchup-grid">
                            <div class="team-box">
                                <img src="https://cdn.nba.com/logos/nba/${game.visitor_team.id}/primary/L/logo.svg" class="team-logo">
                                <div class="team-name">${game.visitor_team.abbreviation}</div>
                                <div class="score-big">${game.visitor_team_score}</div>
                            </div>
                            <div class="game-meta">
                                <div class="clock-live">${game.status}</div>
                                <div class="period-live">LIVE ANALYTICS</div>
                            </div>
                            <div class="team-box">
                                <img src="https://cdn.nba.com/logos/nba/${game.home_team.id}/primary/L/logo.svg" class="team-logo">
                                <div class="team-name">${game.home_team.abbreviation}</div>
                                <div class="score-big">${game.home_team_score}</div>
                            </div>
                        </div>
                        <div class="proj-grid">
                            <div class="proj-box">
                                <div class="proj-label">SENTINEL LIVE MARGIN</div>
                                <div class="proj-value">${sentinel.spread > 0 ? '+' : ''}${sentinel.spread} <span class="conf-tag">[${sentinel.confidence}% CLOCK]</span></div>
                            </div>
                            <div class="proj-box">
                                <div class="proj-label">ESTIMATED PACE TOTAL</div>
                                <div class="proj-value">${sentinel.total} PTS</div>
                            </div>
                            <div class="proj-box">
                                <div class="proj-label">WIN PROBABILITY</div>
                                <div class="proj-value">${sentinel.prob}% (${toAmerican(sentinel.prob)})</div>
                            </div>
                        </div>
                    </div>`;
            } else if (game.status === "Scheduled") {
                upcomingHtml += `
                    <div class="upcoming-card">
                        <div class="upcoming-header">
                            <span>NBA SLATE</span>
                            <span style="color:var(--accent)">PENDING</span>
                        </div>
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                            <span>${game.visitor_team.abbreviation}</span>
                            <span style="color:var(--text-dim)">@</span>
                            <span>${game.home_team.abbreviation}</span>
                        </div>
                    </div>`;
            }
        });

        LIVE_ROOT.innerHTML = liveHtml || '<div class="empty-state">NO LIVE GAMES DETECTED</div>';
        UPCOMING_ROOT.innerHTML = upcomingHtml || '<div class="empty-state">NO UPCOMING SLATE</div>';
    }

    setInterval(() => {
        const now = new Date();
        CLOCK_UI.innerText = now.toLocaleString('en-US', { 
            month: 'short', day: 'numeric', year: 'numeric', 
            hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false 
        }).toUpperCase();

        if (POWER.checked) {
            syncCount--;
            if (syncCount <= 0) {
                syncData();
                syncCount = 3;
            }
            SYNC_TIMER_UI.innerText = syncCount.toString().padStart(2, '0');
        }
    }, 1000);

    syncData();
</script>
</body>
</html>
